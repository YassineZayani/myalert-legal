<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyAlert — Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d0d;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    p { color: #888; font-size: 16px; margin-bottom: 40px; }
    .links { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
    a {
      display: inline-block;
      padding: 14px 28px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      color: #f0f0f0;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      transition: background 0.2s, border-color 0.2s;
    }
    a:hover { background: #252525; border-color: #555; }
    .footer { margin-top: 60px; color: #444; font-size: 13px; }
  </style>
</head>
<body>
  <div class="logo">⚡️</div>
  <h1>MyAlert</h1>
  <p>Monitor what matters.</p>
  <div class="links">
    <a href="privacy.html">Privacy Policy</a>
    <a href="terms.html">Terms of Service</a>
  </div>
  <div class="footer">© 2025 MyAlert. All rights reserved.</div>
</body>
</html>
